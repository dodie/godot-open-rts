name: Build

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Scony/godot-gdscript-toolkit@f61a1f3a9f2f757813bd5176a28903502bd44959
      - run: gdformat --check source/
      - run: gdlint source/

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2.4.1
        with:
          version: 4.7.1
          use-dotnet: false
          include-templates: true

      - name: Export project for web
        run: ./export-web.sh

      - name: Upload web export
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: build/web
          if-no-files-found: error

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download web export
        uses: actions/download-artifact@v7
        with:
          name: web
          path: build/web

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
